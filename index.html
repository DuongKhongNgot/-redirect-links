<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redirecting...</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<meta http-equiv="refresh" content="1; url=https://leducphat.vercel.app/">

<style>

:root {
--pink:#ff2d78;
--bg:#fafaf8;
--card:#ffffff;
--ink:#0d0d0d;
--border:#0d0d0d;
--shadow:#0d0d0d;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

background:var(--bg);
color:var(--ink);

font-family:'DM Sans',sans-serif;

height:100vh;

display:flex;
align-items:center;
justify-content:center;

}

/* top stripe */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:5px;

background:linear-gradient(
90deg,
#ff2d78,
#8b2fff,
#00c8f0
);

}

/* card */

.card{

background:var(--card);

border:2.5px solid var(--border);

border-radius:18px;

padding:40px;

text-align:center;

box-shadow:6px 6px 0 var(--shadow);

}

/* title */

h1{

font-family:'Unbounded';

font-weight:900;

font-size:32px;

background:linear-gradient(
135deg,
#ff2d78,
#8b2fff,
#00c8f0
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* loader */

.loader{

margin:25px auto;

width:40px;
height:40px;

border-radius:50%;

border:4px solid black;

border-top:4px solid var(--pink);

animation:spin 1s linear infinite;

}

@keyframes spin{

to{transform:rotate(360deg)}

}

/* link */

a{

display:inline-block;

margin-top:10px;

font-family:'Unbounded';

font-size:12px;

padding:10px 20px;

border-radius:10px;

border:2px solid var(--border);

text-decoration:none;

color:var(--ink);

box-shadow:3px 3px 0 var(--shadow);

}

a:hover{

transform:translate(-2px,-2px);

box-shadow:6px 6px 0 var(--shadow);

}

</style>

<script>

setTimeout(()=>{

window.location.href="https://leducphat.vercel.app/";

},1000)

</script>

</head>

<body>

<div class="topbar"></div>

<div class="card">

<h1>Redirecting</h1>

<div class="loader"></div>

<a href="https://leducphat.vercel.app/">

Open site

</a>

</div>

</body>
</html>
